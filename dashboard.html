<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azania Marketplace</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Arial, sans-serif;}
body {background:#fff; color:#111;}

/* NAVBAR */
.navbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#043927;
    padding:0.6rem 1rem;
    color:white;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}
.nav-left, .nav-center, .nav-right {display:flex; align-items:center; gap:10px;}
.nav-left {flex:1; justify-content:flex-start;}
.nav-center {flex:1; justify-content:center;}
.nav-right {flex:1; justify-content:flex-end; gap:0.6rem;}

.logo {width:45px; cursor:pointer;}
.hamburger {font-size:1.8rem; cursor:pointer; background:none; border:none; color:white; display:block;}

#language-select {
    border-radius:5px;
    border:none;
    padding:0.25rem 0.4rem;
    min-width:90px;
    max-width:110px;
    font-size:0.85rem;
}

#searchInput {padding:0.5rem; border-radius:6px; border:none; width:250px; max-width:50vw;}
.icon-btn {background:#056848; border:none; padding:0.5rem; border-radius:6px; cursor:pointer; color:white;}
.icon-btn:hover {background:#03291c;}

/* LAYOUT */
.container {display:flex; margin-top:70px;}

/* SIDEBAR */
.sidebar {width:220px; background:#043927; padding:1rem; height:calc(100vh-70px); position:sticky; top:70px; transition:transform 0.3s ease;}
.sidebar h3 {margin-bottom:1rem; color:white;}
.sidebar a {display:block; margin-bottom:0.7rem; text-decoration:none; color:white; font-weight:500; cursor:pointer;}
.sidebar a:hover {color:#b0e0a8;}

/* MAIN */
main {flex:1; padding:1rem; max-width:1200px;}

/* SLIDER */
.slider {position:relative; overflow:hidden; border-radius:12px; margin-bottom:20px;}
.slides {display:flex; transition:transform 0.5s ease;}
.slide {min-width:100%;}
.slide img {width:100%; height:350px; object-fit:cover;}
.slider-btn {position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); border:none; color:white; font-size:2rem; cursor:pointer;}
.prev {left:10px;} .next {right:10px;}

/* PRODUCTS */
.products-grid {display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px;}
.product-card {border:1px solid #ddd; border-radius:10px; padding:0.7rem;}
.product-card img {width:100%; border-radius:8px;}
.product-title {font-weight:600; margin:0.5rem 0;}
.product-price {color:#043927; font-weight:bold;}
.add-cart-btn {margin-top:0.5rem; background:#043927; color:white; border:none; padding:0.4rem; border-radius:6px; cursor:pointer;}

/* =========================
   FLOATING CHAT (NEW)
========================= */

/* chat button */
#chat-bubble {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    background: #043927;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    z-index: 3000;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* chat window */
#chat-widget {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 260px;
    background: #043927;
    color: white;
    border-radius: 12px;
    overflow: hidden;
    z-index: 3000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    font-size: 0.8rem;
}

/* hide */
.hidden { display:none; }

/* header */
#chat-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px;
    background:#03291c;
    font-weight:bold;
}

#minimize-chat {
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* messages */
#chat-messages {
    height:180px;
    overflow-y:auto;
    padding:8px;
}

/* input */
#chat-input-area {
    border-top:1px solid #03291c;
}

#chat-input {
    width:100%;
    border:none;
    padding:8px;
    font-size:0.8rem;
    outline:none;
}

/* RESPONSIVE */
@media screen and (max-width:900px){
    .sidebar {position:fixed; left:0; top:70px; transform:translateX(-100%); z-index:999;}
    .sidebar.show {transform:translateX(0);}
    .container {flex-direction:column;}
    main {max-width:100%;}
    #searchInput {width:150px;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" id="hamburger-btn">☰</button>

        <select id="language-select">
            <option value="en">English</option>
            <option value="zu">Zulu</option>
            <option value="xh">Xhosa</option>
            <option value="tn">Tswana</option>
            <option value="ve">Venda</option>
            <option value="nr">Ndebele</option>
            <option value="st">Southern Sotho</option>
            <option value="nso">Northern Sotho</option>
        </select>
    </div>

    <div class="nav-center">
        <img src="A.jpg" class="logo" onclick="location.href='index.html'">
    </div>

    <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search products...">
        <button class="icon-btn" onclick="location.href='cart.html'">🛒</button>
        <button class="icon-btn" onclick="location.href='ACC.html'">👤</button>
    </div>
</header>

<!-- LAYOUT -->
<div class="container">

    <aside class="sidebar" id="sidebar">
        <h3>Categories</h3>
        <a onclick="filterCategory('all')">All</a>
        <a onclick="filterCategory('clothing')">Clothing</a>
        <a onclick="filterCategory('shoes')">Shoes</a>
        <a onclick="filterCategory('accessories')">Accessories</a>
        <a onclick="filterCategory('new')">New Arrivals</a>
    </aside>

    <main>
        <section class="slider">
            <div class="slides" id="slides">
                <div class="slide"><img src="Azania.png"></div>
                <div class="slide"><img src="Azania.png"></div>
                <div class="slide"><img src="Azania.png"></div>
            </div>
            <button class="slider-btn prev" id="prev">❮</button>
            <button class="slider-btn next" id="next">❯</button>
        </section>

        <section class="products-grid" id="products"></section>
    </main>
</div>

<!-- ================= FLOATING CHAT ================= -->
<div id="chat-bubble">💬</div>

<div id="chat-widget" class="hidden">
    <div id="chat-header">
        <span>Azania AI</span>
        <button id="minimize-chat">−</button>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Ask about products..." />
    </div>
</div>

<script>

// Hamburger
const hamburger = document.getElementById('hamburger-btn');
const sidebar = document.getElementById('sidebar');
hamburger.onclick = () => sidebar.classList.toggle('show');

// Slider
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = document.querySelectorAll(".slide").length;

document.getElementById("next").onclick = ()=>{ index=(index+1)%totalSlides; updateSlider(); };
document.getElementById("prev").onclick = ()=>{ index=(index-1+totalSlides)%totalSlides; updateSlider(); };

function updateSlider(){
    slides.style.transform=`translateX(-${document.querySelector(".slide").clientWidth*index}px)`;
}

setInterval(()=>{ index=(index+1)%totalSlides; updateSlider(); }, 4000);

// Products
let allProducts = [];

async function loadProducts(){
    const res = await fetch("https://api.azaniashop.com/api/v1/public/products");
    allProducts = await res.json();
    renderProducts(allProducts);
}

function renderProducts(products){
    const container=document.getElementById("products");
    container.innerHTML="";
    products.forEach(p=>{
        container.innerHTML+=`
        <div class="product-card">
            <img src="${p.image||'A.jpg'}">
            <div class="product-title">${p.name}</div>
            <div class="product-price">R${p.price}</div>
            <button class="add-cart-btn">Add to Cart</button>
        </div>`;
    });
}

// CHAT SYSTEM
const bubble = document.getElementById("chat-bubble");
const widget = document.getElementById("chat-widget");
const minimize = document.getElementById("minimize-chat");

const chatInput = document.getElementById("chat-input");
const chatMessages = document.getElementById("chat-messages");

// open chat
bubble.onclick = () => widget.classList.toggle("hidden");

// minimize
minimize.onclick = () => widget.classList.add("hidden");

// send message
chatInput.addEventListener("keypress", async e=>{
    if(e.key==="Enter"){
        const msg = chatInput.value.trim();
        if(!msg) return;

        chatMessages.innerHTML += `<div><strong>You:</strong> ${msg}</div>`;
        chatInput.value="";

        try{
            const res = await fetch("http://api.azaniashop.com/api/v1/ai", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({ message: msg, products: allProducts })
            });

            const data = await res.json();
            chatMessages.innerHTML += `<div><strong>AI:</strong> ${data.reply}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

        }catch(err){
            chatMessages.innerHTML += `<div><strong>AI:</strong> Error.</div>`;
        }
    }
});

// INIT
window.onload = loadProducts;

</script>

</body>
</html>
