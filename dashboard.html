<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azania Marketplace</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Arial, sans-serif;}
body {background:#fff; color:#111;}

/* NAVBAR */
.navbar {
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#043927;
    padding:0.6rem 1rem;
    color:white;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}
.nav-left, .nav-center, .nav-right {display:flex; align-items:center; gap:10px;}
.nav-left {flex:1; justify-content:flex-start;}
.nav-center {flex:1; justify-content:center;}
.nav-right {flex:1; justify-content:flex-end; gap:0.6rem;}

.logo {width:45px; cursor:pointer;}
.hamburger {font-size:1.8rem; cursor:pointer; background:none; border:none; color:white; display:block;}

#language-select {
    border-radius:5px;
    border:none;
    padding:0.25rem 0.4rem;
    min-width:90px;
    max-width:110px;
    font-size:0.85rem;
}

#searchInput {padding:0.5rem; border-radius:6px; border:none; width:250px; max-width:50vw;}
.icon-btn {background:#056848; border:none; padding:0.5rem; border-radius:6px; cursor:pointer; color:white;}
.icon-btn:hover {background:#03291c;}

/* LAYOUT */
.container {display:flex; margin-top:70px;}

/* SIDEBAR */
.sidebar {width:220px; background:#043927; padding:1rem; height:calc(100vh-70px); position:sticky; top:70px; transition:transform 0.3s ease;}
.sidebar h3 {margin-bottom:1rem; color:white;}
.sidebar a {display:block; margin-bottom:0.7rem; text-decoration:none; color:white; font-weight:500; cursor:pointer;}
.sidebar a:hover {color:#b0e0a8;}

/* MAIN */
main {flex:1; padding:1rem; max-width:1200px;}

/* SLIDER */
.slider {position:relative; overflow:hidden; border-radius:12px; margin-bottom:20px;}
.slides {display:flex; transition:transform 0.5s ease;}
.slide {min-width:100%;}
.slide img {width:100%; height:350px; object-fit:cover;}
.slider-btn {position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); border:none; color:white; font-size:2rem; cursor:pointer;}
.prev {left:10px;} .next {right:10px;}

/* PRODUCTS */
.products-grid {display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px;}
.product-card {border:1px solid #ddd; border-radius:10px; padding:0.7rem; transition: transform 0.2s, box-shadow 0.2s;}
.product-card:hover {transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
.product-card img {width:100%; height:200px; object-fit:cover; border-radius:8px;}
.product-title {font-weight:600; margin:0.5rem 0;}
.product-price {color:#043927; font-weight:bold; font-size:1.1rem;}
.product-stock {font-size:0.8rem; color:#666; margin-top:5px;}
.add-cart-btn {margin-top:0.5rem; background:#043927; color:white; border:none; padding:0.5rem; border-radius:6px; cursor:pointer; width:100%; transition: background 0.2s;}
.add-cart-btn:hover {background:#03291c;}

.loading, .error {text-align: center; padding: 40px; font-size: 1.1rem;}
.error {color: #d32f2f;}
.loading {color: #043927;}

/* =========================
   FLOATING CHAT
========================= */

/* chat button */
#chat-bubble {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    background: #043927;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    z-index: 3000;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}
#chat-bubble:hover {transform: scale(1.1);}

/* chat window */
#chat-widget {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 300px;
    background: white;
    color: #333;
    border-radius: 12px;
    overflow: hidden;
    z-index: 3000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    font-size: 0.85rem;
}

/* hide */
.hidden { display:none; }

/* header */
#chat-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#043927;
    color: white;
    font-weight:bold;
}

#minimize-chat {
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

/* messages */
#chat-messages {
    height:250px;
    overflow-y:auto;
    padding:12px;
    background: #f9f9f9;
}

#chat-messages div {
    margin-bottom: 10px;
    line-height: 1.4;
}

#chat-messages strong {
    color: #043927;
}

/* input */
#chat-input-area {
    border-top: 1px solid #ddd;
    background: white;
}

#chat-input {
    width:100%;
    border: none;
    padding:12px;
    font-size:0.85rem;
    outline:none;
}

/* RESPONSIVE */
@media screen and (max-width:900px){
    .sidebar {position:fixed; left:0; top:70px; transform:translateX(-100%); z-index:999;}
    .sidebar.show {transform:translateX(0);}
    .container {flex-direction:column;}
    main {max-width:100%;}
    #searchInput {width:150px;}
    #chat-widget {width: 280px; right: 10px; bottom: 80px;}
    #chat-bubble {right: 10px; bottom: 10px;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-left">
        <button class="hamburger" id="hamburger-btn">☰</button>

        <select id="language-select">
            <option value="en">English</option>
            <option value="zu">Zulu</option>
            <option value="xh">Xhosa</option>
            <option value="tn">Tswana</option>
            <option value="ve">Venda</option>
            <option value="nr">Ndebele</option>
            <option value="st">Southern Sotho</option>
            <option value="nso">Northern Sotho</option>
        </select>
    </div>

    <div class="nav-center">
        <img src="A.jpg" class="logo" onclick="location.href='index.html'">
    </div>

    <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search products...">
        <button class="icon-btn" onclick="location.href='cart.html'">🛒</button>
        <button class="icon-btn" onclick="location.href='ACC.html'">👤</button>
    </div>
</header>

<!-- LAYOUT -->
<div class="container">

    <aside class="sidebar" id="sidebar">
        <h3>Categories</h3>
        <a onclick="filterCategory('all')">All</a>
        <a onclick="filterCategory('clothing')">Clothing</a>
        <a onclick="filterCategory('shoes')">Shoes</a>
        <a onclick="filterCategory('accessories')">Accessories</a>
        <a onclick="filterCategory('new')">New Arrivals</a>
    </aside>

    <main>
        <section class="slider">
            <div class="slides" id="slides">
                <div class="slide"><img src="Azania.png" alt="Azania Banner 1"></div>
                <div class="slide"><img src="Azania.png" alt="Azania Banner 2"></div>
                <div class="slide"><img src="Azania.png" alt="Azania Banner 3"></div>
            </div>
            <button class="slider-btn prev" id="prev">❮</button>
            <button class="slider-btn next" id="next">❯</button>
        </section>

        <section class="products-grid" id="products">
            <div class="loading">Loading products...</div>
        </section>
    </main>
</div>

<!-- ================= FLOATING CHAT ================= -->
<div id="chat-bubble">💬</div>

<div id="chat-widget" class="hidden">
    <div id="chat-header">
        <span>🤖 Azania AI Assistant</span>
        <button id="minimize-chat">−</button>
    </div>

    <div id="chat-messages">
        <div><strong>AI:</strong> Hello! Welcome to Azania Marketplace! How can I help you today?</div>
    </div>

    <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Ask about products, prices, shipping..." />
    </div>
</div>

<script>
// Hamburger menu
const hamburger = document.getElementById('hamburger-btn');
const sidebar = document.getElementById('sidebar');
if (hamburger) {
    hamburger.onclick = () => sidebar.classList.toggle('show');
}

// Slider functionality
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = document.querySelectorAll(".slide").length;

if (document.getElementById("next") && document.getElementById("prev")) {
    document.getElementById("next").onclick = () => { 
        index = (index + 1) % totalSlides; 
        updateSlider(); 
    };
    
    document.getElementById("prev").onclick = () => { 
        index = (index - 1 + totalSlides) % totalSlides; 
        updateSlider(); 
    };
}

function updateSlider() {
    if (slides && document.querySelector(".slide")) {
        const slideWidth = document.querySelector(".slide").clientWidth;
        slides.style.transform = `translateX(-${slideWidth * index}px)`;
    }
}

// Auto-slide every 4 seconds
if (totalSlides > 0) {
    setInterval(() => { 
        index = (index + 1) % totalSlides; 
        updateSlider(); 
    }, 4000);
}

// Products data
let allProducts = [];

// Get the base API URL (use relative path for same-origin, or configure for production)
const getApiUrl = () => {
    // If running on localhost, use local backend
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return '';
    }
    // For production, use relative path (assuming frontend and backend on same domain)
    return '';
};

async function loadProducts() {
    const container = document.getElementById("products");
    container.innerHTML = '<div class="loading">Loading products...</div>';
    
    try {
        // ✅ FIXED: Use correct endpoint /api/products (not /api/v1/public/products)
        const response = await fetch('/api/products');
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        console.log('API Response:', result);
        
        // Handle the response format { success: true, data: products }
        if (result.success && result.data) {
            allProducts = result.data;
            renderProducts(allProducts);
        } else if (Array.isArray(result)) {
            // If response is directly an array
            allProducts = result;
            renderProducts(allProducts);
        } else {
            throw new Error('Invalid response format from server');
        }
    } catch (error) {
        console.error('Error loading products:', error);
        container.innerHTML = `
            <div class="error">
                <strong>⚠️ Error loading products</strong><br>
                ${error.message}<br><br>
                <button onclick="loadProducts()" style="padding: 10px 20px; background: #043927; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    Try Again
                </button>
            </div>
        `;
    }
}

function renderProducts(products) {
    const container = document.getElementById("products");
    
    if (!products || products.length === 0) {
        container.innerHTML = '<div class="loading">No products found.</div>';
        return;
    }
    
    container.innerHTML = "";
    products.forEach(product => {
        // Handle different possible field names from your Product model
        const productName = product.name || 'Product Name';
        const productPrice = product.price || 0;
        const productImage = product.image || product.images?.[0] || 'A.jpg';
        const productId = product._id || product.id;
        const stock = product.stock || 0;
        
        container.innerHTML += `
            <div class="product-card">
                <img src="${productImage}" alt="${productName}" onerror="this.src='A.jpg'">
                <div class="product-title">${productName}</div>
                <div class="product-price">R${productPrice.toFixed(2)}</div>
                <div class="product-stock">${stock > 0 ? `In Stock (${stock})` : 'Out of Stock'}</div>
                <button class="add-cart-btn" onclick="addToCart('${productId}', '${productName}', ${productPrice})" ${stock === 0 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>
                    ${stock > 0 ? 'Add to Cart 🛒' : 'Out of Stock'}
                </button>
            </div>
        `;
    });
}

function filterCategory(category) {
    if (category === 'all') {
        renderProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === category);
        renderProducts(filtered);
    }
}

function addToCart(productId, productName, price) {
    console.log('Added to cart:', { productId, productName, price });
    
    // Get existing cart from localStorage
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    
    // Check if product already in cart
    const existingItem = cart.find(item => item.id === productId);
    
    if (existingItem) {
        existingItem.quantity = (existingItem.quantity || 1) + 1;
    } else {
        cart.push({
            id: productId,
            name: productName,
            price: price,
            quantity: 1
        });
    }
    
    // Save to localStorage
    localStorage.setItem('cart', JSON.stringify(cart));
    
    // Show notification
    alert(`${productName} added to cart!`);
    
    // Update cart count if you have a badge
    updateCartCount();
}

function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    
    // You can add a cart badge here if needed
    console.log(`Cart has ${totalItems} items`);
}

// Search functionality
const searchInput = document.getElementById('searchInput');
if (searchInput) {
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        
        searchTimeout = setTimeout(() => {
            if (query) {
                searchProducts(query);
            } else {
                renderProducts(allProducts);
            }
        }, 300);
    });
}

async function searchProducts(query) {
    try {
        const response = await fetch(`/api/products/search?q=${encodeURIComponent(query)}`);
        const result = await response.json();
        
        if (result.success && result.data) {
            renderProducts(result.data);
        } else if (Array.isArray(result)) {
            renderProducts(result);
        } else {
            renderProducts([]);
        }
    } catch (error) {
        console.error('Search error:', error);
        // Fallback to client-side search
        const filtered = allProducts.filter(p => 
            p.name.toLowerCase().includes(query.toLowerCase()) ||
            (p.description && p.description.toLowerCase().includes(query.toLowerCase()))
        );
        renderProducts(filtered);
    }
}

// CHAT SYSTEM
const bubble = document.getElementById("chat-bubble");
const widget = document.getElementById("chat-widget");
const minimize = document.getElementById("minimize-chat");
const chatInput = document.getElementById("chat-input");
const chatMessages = document.getElementById("chat-messages");

if (bubble && widget) {
    bubble.onclick = () => {
        widget.classList.toggle("hidden");
        if (!widget.classList.contains("hidden") && chatMessages) {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    };
}

if (minimize && widget) {
    minimize.onclick = () => widget.classList.add("hidden");
}

// Simple AI chat responses (client-side)
function getAIResponse(message, products) {
    const lowerMsg = message.toLowerCase();
    
    if (lowerMsg.includes("price") || lowerMsg.includes("cost")) {
        if (products && products.length > 0) {
            const cheapest = Math.min(...products.map(p => p.price || 0));
            const mostExpensive = Math.max(...products.map(p => p.price || 0));
            return `Our products range from R${cheapest.toFixed(2)} to R${mostExpensive.toFixed(2)}. Is there a specific product you're interested in?`;
        }
        return "Our products range from affordable to premium prices. Check our collection for specific pricing!";
    }
    
    if (lowerMsg.includes("shipping") || lowerMsg.includes("delivery")) {
        return "We ship nationwide within 3-5 business days. Free shipping on orders over R500! 🚚";
    }
    
    if (lowerMsg.includes("return") || lowerMsg.includes("refund")) {
        return "We offer 30-day returns on all unused items in original packaging. Customer satisfaction is our priority! ✅";
    }
    
    if (lowerMsg.includes("size")) {
        return "Please check our size guide on each product page for accurate measurements. We offer standard US/UK sizes. 📏";
    }
    
    if (lowerMsg.includes("payment")) {
        return "We accept Credit Cards, PayFast, and EFT payments. All transactions are secure! 💳";
    }
    
    if (lowerMsg.includes("hello") || lowerMsg.includes("hi") || lowerMsg.includes("hey")) {
        return "Hello! Welcome to Azania Marketplace! How can I help you find the perfect product today? 😊";
    }
    
    if (lowerMsg.includes("product") || lowerMsg.includes("item")) {
        if (products && products.length > 0) {
            return `We have ${products.length} amazing products available! You can browse them all on our store. Would you like me to help you find something specific?`;
        }
        return "We have a wonderful collection of African-inspired products! Check out our store for the latest arrivals.";
    }
    
    return "Thank you for shopping at Azania! How can I help you with our African-inspired products? Feel free to ask about prices, sizes, shipping, or returns! 🌟";
}

if (chatInput && chatMessages) {
    chatInput.addEventListener("keypress", async (e) => {
        if (e.key === "Enter") {
            const msg = chatInput.value.trim();
            if (!msg) return;

            // Add user message
            chatMessages.innerHTML += `<div><strong>You:</strong> ${escapeHtml(msg)}</div>`;
            chatInput.value = "";
            
            // Show typing indicator
            chatMessages.innerHTML += `<div id="typing" style="color: #666;"><em>AI is typing...</em></div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Simulate typing delay
            setTimeout(() => {
                // Remove typing indicator
                const typingIndicator = document.getElementById("typing");
                if (typingIndicator) typingIndicator.remove();
                
                // Get AI response
                const reply = getAIResponse(msg, allProducts);
                chatMessages.innerHTML += `<div><strong>🤖 AI:</strong> ${reply}</div>`;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 500);
        }
    });
}

// Helper function to escape HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Test backend connection
async function testBackend() {
    try {
        const response = await fetch('/api/test');
        if (response.ok) {
            const data = await response.json();
            console.log('✅ Backend connected:', data);
        } else {
            console.warn('⚠️ Backend test endpoint not found (this is fine if not implemented)');
        }
    } catch (error) {
        console.warn('⚠️ Backend connection test failed:', error.message);
    }
}

// Language selector functionality
const languageSelect = document.getElementById('language-select');
if (languageSelect) {
    languageSelect.addEventListener('change', (e) => {
        const lang = e.target.value;
        console.log(`Language changed to: ${lang}`);
        // You can implement language translation here
        alert(`Language changed to ${lang.toUpperCase()}. Translation feature coming soon!`);
    });
}

// Initialize on page load
window.onload = () => {
    testBackend();
    loadProducts();
    updateCartCount();
};

// Add resize handler for slider
window.addEventListener('resize', () => {
    updateSlider();
});
</script>

</body>
</html>
