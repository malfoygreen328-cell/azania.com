<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Azania Marketplace</title>
  <style>
    /* ===============================
       Bottle Green Theme Styles
    =============================== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #e6f0ea; /* light green background */
      color: #043927; /* bottle green text */
    }

    header {
      background-color: #043927;
      color: #fff;
      padding: 20px 0;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
    }

    main {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background-color: #f5faf5;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #043927;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input, textarea {
      margin: 10px 0;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #043927;
      font-size: 1em;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      background-color: #043927;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }

    button:hover {
      background-color: #06553d;
    }

    footer {
      text-align: center;
      margin: 50px 0 20px;
      font-size: 0.9em;
      color: #06553d;
    }

    /* Responsive */
    @media (max-width: 640px) {
      main {
        margin: 20px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Azania Marketplace</h1>
  </header>

  <main>
    <h2>Get in Touch</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <p id="feedback" style="text-align:center; color:#06553d; margin-top:10px;"></p>
  </main>

  <footer>
    &copy; 2026 Azania Marketplace
  </footer>

  <script>
    // Simple form submission feedback
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      if(name && email && message) {
        document.getElementById("feedback").textContent = "✅ Thank you, your message has been sent!";
        // Clear form
        this.reset();
      } else {
        document.getElementById("feedback").textContent = "⚠️ Please fill in all fields.";
      }
    });
  </script>

</body>
</html>
