<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azania Checkout</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:20px;
background:#043927;
}

.checkout-container{
max-width:800px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
}

h1,h2{
text-align:center;
color:#043927;
}

.billing-section input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

.summary-section{
margin-top:30px;
}

#order-summary{
list-style:none;
padding:0;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:16px;
background:#043927;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#056848;
}
</style>
</head>

<body>

<main class="checkout-container">

<h1>Checkout</h1>

<section class="billing-section">
<h2>Shipping Information</h2>

<form id="checkout-form">

<input type="text" id="fullName" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="address" placeholder="Address" required>
<input type="text" id="city" placeholder="City" required>
<input type="text" id="postal" placeholder="Postal Code" required>
<input type="text" id="country" placeholder="Country" required>

</form>

</section>

<section class="summary-section">

<h2>Order Summary</h2>

<ul id="order-summary"></ul>

<h3>Total: R<span id="order-total">0.00</span></h3>

<button onclick="completeCheckout()">Pay with PayFast</button>

</section>

</main>

<script>

/* =============================
CONFIG
============================= */

const ORDER_API = "http://localhost:5000/api/orders";
const PRODUCT_API = "http://localhost:5000/api/products";
const PAYFAST_API = "http://localhost:5000/api/payfast/create-payment";

/* =============================
HELPERS
============================= */

function getUser(){
return JSON.parse(localStorage.getItem("azaniaUser"));
}

function getToken(){
return localStorage.getItem("azaniaToken");
}

function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

/* =============================
RENDER CART
============================= */

async function renderSummary(){

const cart = getCart();
const summaryList = document.getElementById("order-summary");
const totalElement = document.getElementById("order-total");

summaryList.innerHTML="";

if(cart.length===0){
summaryList.innerHTML="<li>Your cart is empty</li>";
return;
}

let total = 0;

try{

const res = await fetch(PRODUCT_API);
const products = await res.json();

cart.forEach(cartItem => {

const product = products.find(p => p._id === cartItem);

if(!product) return;

total += product.price;

const li = document.createElement("li");
li.textContent = `${product.name} - R${product.price}`;
summaryList.appendChild(li);

});

totalElement.textContent = total.toFixed(2);

}catch(err){
console.error(err);
summaryList.innerHTML="<li>Failed to load cart</li>";
}

}

/* =============================
COMPLETE CHECKOUT + PAYFAST
============================= */

async function completeCheckout(){

const user = getUser();
const token = getToken();
const cart = getCart();

if(!user){
alert("Please login first");
return;
}

if(cart.length===0){
alert("Cart is empty");
return;
}

const shippingAddress = {
fullName: document.getElementById("fullName").value,
email: document.getElementById("email").value,
address: document.getElementById("address").value,
city: document.getElementById("city").value,
postal: document.getElementById("postal").value,
country: document.getElementById("country").value
};

try{

/* STEP 1: Get products */

const productRes = await fetch(PRODUCT_API);
const products = await productRes.json();

/* STEP 2: Build order items */

const items = cart.map(id => {
const product = products.find(p => p._id === id);

return{
product: id,
name: product.name,
price: product.price,
quantity: 1
};
});

const totalAmount = items.reduce((sum,i)=>sum+i.price*i.quantity,0);

/* STEP 3: Create order */

const orderRes = await fetch(ORDER_API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
items,
totalAmount,
shippingAddress
})
});

const orderData = await orderRes.json();

if(!orderRes.ok){
alert(orderData.message || "Order failed");
return;
}

const orderId = orderData.order._id;

/* STEP 4: Call PayFast */

const payRes = await fetch(PAYFAST_API,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({ orderId })
});

const payData = await payRes.json();

if(!payRes.ok || !payData.payfastUrl){
alert("Payment initialization failed");
return;
}

/* STEP 5: Redirect to PayFast */

window.location.href = payData.payfastUrl;

}catch(err){
console.error(err);
alert("Checkout failed");
}

}

/* =============================
INIT
============================= */

document.addEventListener("DOMContentLoaded",renderSummary);

</script>

</body>
</html>
