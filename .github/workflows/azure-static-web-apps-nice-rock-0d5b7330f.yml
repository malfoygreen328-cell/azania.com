name: Deploy Azania Frontend + Backend

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------
  # 1️⃣ Frontend Deployment
  # -------------------------
  frontend:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy Frontend
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_ROCK_0D5B7330F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"        # Frontend root
          api_location: ""         # Leave empty if backend is separate
          output_location: ""      # For plain HTML/JS

  # -------------------------
  # 2️⃣ Backend Deployment
  # -------------------------
  backend:
    runs-on: ubuntu-latest
    needs: frontend
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build --if-present

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3C6D185005AC454988B5799772FDFAF2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3A8B9407623C4A82897B138E1DE47F1F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E5E1D2FA3E6242E4986E59D97E7BF16F }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Azania-backend'
          slot-name: 'Production'
          package: .
